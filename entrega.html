<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Entrega • Oxente</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="app.js" defer></script>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <a class="icon-btn" href="carrinho.html">← Voltar</a>

      <div class="brand">
        <img src="logo.oxente.jpg" alt="Logo">
        <div class="title">
          <strong>ENTREGA</strong>
          <span>Preencha os dados</span>
        </div>
      </div>

      <a class="icon-btn" href="carrinho.html">🛒 <span class="badge" data-cart-badge style="display:none;">0</span></a>
    </div>
  </div>

  <div class="safe">
    <div class="h1">Dados para entrega</div>
    <div class="sub">Essas informações irão junto com o pedido no WhatsApp.</div>

    <form class="form" onsubmit="event.preventDefault(); saveCustomer(); window.location.href='pagamento.html';">
      <div class="field">
        <label for="nome">Nome:</label>
        <input id="nome" placeholder="Seu nome" required>
      </div>

      <div class="field">
        <label for="endereco">Endereço:</label>
        <input id="endereco" placeholder="Rua, nº, bairro..." required>
      </div>

      <div class="field">
        <label for="ref">Ref (se for o caso):</label>
        <input id="ref" placeholder="Ponto de referência (opcional)">
      </div>

      <button class="btn" type="submit">Ir para pagamento</button>
      <div class="smallnote">Dica: o carrinho fica salvo mesmo se você fechar o navegador.</div>
    </form>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", loadCustomer);
  </script>
</body>
</html>
