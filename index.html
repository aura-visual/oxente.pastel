<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Oxente Pastel</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="app.js" defer></script>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img src="logo.oxente.jpg" alt="Logo Oxente Pastel">
        <div class="title">
          <strong>OXENTE PASTEL</strong>
          <span>Cardápio • rápido • estilo app</span>
        </div>
      </div>

      <a class="icon-btn" href="carrinho.html" aria-label="Carrinho">
        🛒 <span class="badge" data-cart-badge style="display:none;">0</span>
      </a>
    </div>
  </div>

  <div class="safe">
    <div class="h1">Escolha uma categoria</div>
    <div class="sub">Toque no card para abrir. Seu carrinho fica salvo automaticamente.</div>

    <div class="grid">

      <a class="card" href="pasteis.html">
        <div class="card-media">
          <img src="pastel.jpg" alt="Pastéis">
        </div>
        <div class="card-body">
          <div>
            <strong>Pastéis</strong>
            <div><span>Monte seu pastel e especiais</span></div>
          </div>
          <div class="chip">ABRIR →</div>
        </div>
      </a>

      <a class="card" href="combos.html">
        <div class="card-media">
          <img src="combo.jpg" alt="Combos">
        </div>
        <div class="card-body">
          <div>
            <strong>Combos</strong>
            <div><span>Pra encher o bucho</span></div>
          </div>
          <div class="chip">ABRIR →</div>
        </div>
      </a>

      <a class="card" href="bebidas.html">
        <div class="card-media">
          <img src="bebida.jpg" alt="Bebidas">
        </div>
        <div class="card-body">
          <div>
            <strong>Bebidas</strong>
            <div><span>Geladas e vitaminas</span></div>
          </div>
          <div class="chip">ABRIR →</div>
        </div>
      </a>

    </div>
  </div>

</body>
</html>
