<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pagamento • Oxente</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="app.js" defer></script>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <a class="icon-btn" href="entrega.html">← Voltar</a>

      <div class="brand">
        <img src="logo.oxente.jpg" alt="Logo">
        <div class="title">
          <strong>PAGAMENTO</strong>
          <span>Confira e finalize</span>
        </div>
      </div>

      <a class="icon-btn" href="carrinho.html">🛒 <span class="badge" data-cart-badge style="display:none;">0</span></a>
    </div>
  </div>

  <div class="safe">
    <div class="h1">Pagamento</div>
    <div class="sub">Veja o relatório do pedido e escolha a forma de pagamento.</div>

    <div id="paySummary"></div>

    <div class="h1" style="margin-top:16px;">Forma de pagamento</div>

    <div class="paygrid">
      <button type="button" class="paybtn" data-pay="pix" onclick="setPayment('pix')">
        PIX <span>Selecionar</span>
      </button>

      <button type="button" class="paybtn" data-pay="cartao" onclick="setPayment('cartao')">
        Cartão (débito/crédito) <span>Selecionar</span>
      </button>

      <button type="button" class="paybtn" data-pay="dinheiro" onclick="setPayment('dinheiro')">
        Dinheiro <span>Selecionar</span>
      </button>
    </div>

    <div class="hr"></div>

    <button class="btn" onclick="finalizarWhatsApp()">Finalizar e enviar no WhatsApp</button>
    <div class="smallnote">Ao finalizar, seu pedido será enviado para <strong>+55 88 99865-0795</strong> no formato ideal para impressão (80mm).</div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", renderPaymentSummary);
  </script>
</body>
</html>
