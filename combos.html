<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Combos • Oxente</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="app.js" defer></script>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <a class="icon-btn" href="index.html">← Voltar</a>

      <div class="brand">
        <img src="logo.oxente.jpg" alt="Logo">
        <div class="title">
          <strong>COMBOS</strong>
          <span>Pra encher o bucho</span>
        </div>
      </div>

      <a class="icon-btn" href="carrinho.html">🛒 <span class="badge" data-cart-badge style="display:none;">0</span></a>
    </div>
  </div>

  <div class="safe">
    <div class="h1">Combos</div>
    <div class="sub">Conforme cardápio</div>

    <div class="list">

      <div class="item">
        <div class="item-top">
          <div>
            <h3>COMBO ARRÍEGUA</h3>
            <p>2 Pastéis Cabra Macho com refrigerante de 1 litro.</p>
          </div>
          <div class="price">R$ 43,00</div>
        </div>
        <div class="actions">
          <button class="btn" onclick="addItem('combo-arriegua','Combo Arríegua',43.00)">Adicionar</button>
        </div>
      </div>

      <div class="item">
        <div class="item-top">
          <div>
            <h3>COMBO SUPER ARRETADO</h3>
            <p>4 Pastéis Cabra Macho com refrigerante de 1 litro + 4 pasteizinhos doces grátis.</p>
          </div>
          <div class="price">R$ 85,00</div>
        </div>
        <div class="actions">
          <button class="btn" onclick="addItem('combo-superarretado','Combo Super Arretado',85.00)">Adicionar</button>
        </div>
      </div>

    </div>
  </div>

  <div class="footerbar">
    <div class="footerbar-inner">
      <div class="totalbox">
        <small>Total atual</small>
        <strong data-cart-total>R$ 0,00</strong>
      </div>
      <a class="btn" href="carrinho.html" style="width:auto; padding:14px 16px;">Ver carrinho</a>
    </div>
  </div>

</body>
</html>
