<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Combos</title>

<link rel="icon" href="logo.oxente.jpg">
<link rel="stylesheet" href="style.css">
<script src="app.js" defer></script>

</head>

<body onload="progress(25)">

<div class="topbar">
<div class="topbar-inner">

<div class="brand">
<img src="logo.oxente.jpg">
<div class="brand-text">
<strong>Pra encher o buxo</strong>
<span>Escolha seu combo</span>
</div>
</div>

<div>Pedido <span class="cart-count">0</span></div>

</div>

<div class="progress-bar">
<div class="progress-fill"></div>
</div>
</div>

<div class="container">

<div class="list-item">

<div class="list-title">COMBO ARRIÉGUA</div>
<div class="price">R$ 43,00</div>

<div class="qty">
<button onclick="removeItem('Combo Arriégua')">-</button>
<span>1</span>
<button onclick="addItem('Combo Arriégua',43)">+</button>
</div>

</div>

<div class="list-item">

<div class="list-title">COMBO SUPER ARRETADO</div>
<div class="price">R$ 85,00</div>

<div class="qty">
<button onclick="removeItem('Combo Super Arretado')">-</button>
<span>1</span>
<button onclick="addItem('Combo Super Arretado',85)">+</button>
</div>

</div>

</div>

<div class="footer">
<div class="footer-inner">
<div class="total">
Total <span class="cart-total">R$ 0</span>
</div>

<a href="acompanhamentos.html" class="btn">Continuar</a>

</div>
</div>

</body>
</html>
