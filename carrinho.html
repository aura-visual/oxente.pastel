<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Carrinho • Oxente</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="app.js" defer></script>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <a class="icon-btn" href="index.html">← Voltar</a>

      <div class="brand">
        <img src="logo.oxente.jpg" alt="Logo">
        <div class="title">
          <strong>CARRINHO</strong>
          <span>Revise e ajuste seu pedido</span>
        </div>
      </div>

      <div class="icon-btn">🛒 <span class="badge" data-cart-badge style="display:none;">0</span></div>
    </div>
  </div>

  <div class="safe">
    <div class="h1">Seu pedido</div>
    <div class="sub">Use + e − para controlar as quantidades.</div>

    <div id="cartList" class="list"></div>

    <div class="hr"></div>

    <button class="btn btn-ghost" onclick="clearCart(); renderCart();">Limpar carrinho</button>
    <a class="btn" href="entrega.html" style="margin-top:10px; display:block; text-align:center;">Continuar para entrega</a>
  </div>

  <div class="footerbar">
    <div class="footerbar-inner">
      <div class="totalbox">
        <small>Total</small>
        <strong data-cart-total>R$ 0,00</strong>
      </div>
      <a class="btn" href="entrega.html" style="width:auto; padding:14px 16px;">Entrega →</a>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", renderCart);
  </script>
</body>
</html>
