<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Acompanhamentos</title>

<link rel="icon" href="logo.oxente.jpg">
<link rel="stylesheet" href="style.css">
<script src="app.js" defer></script>

</head>

<body onload="progress(50)">

<div class="topbar">
<div class="topbar-inner">

<div class="brand">
<img src="logo.oxente.jpg">
<div class="brand-text">
<strong>Acompanhamentos</strong>
<span>Escolha extras</span>
</div>
</div>

<div>Pedido <span class="cart-count">0</span></div>

</div>

<div class="progress-bar">
<div class="progress-fill"></div>
</div>

</div>

<div class="container">

<div class="list-item">
<div class="list-title">Fritas simples</div>
<div class="price">R$ 10,99</div>

<div class="qty">
<button onclick="removeItem('Fritas simples')">-</button>
<button onclick="addItem('Fritas simples',10.99)">+</button>
</div>
</div>

<div class="list-item">

<div class="list-title">Fritas com carne de sol</div>
<div class="price">R$ 18,99</div>

<div class="qty">
<button onclick="removeItem('Fritas carne de sol')">-</button>
<button onclick="addItem('Fritas carne de sol',18.99)">+</button>
</div>

<div class="notice">
Escolha adicional: Cheddar ou Cream Cheese
</div>

</div>

</div>

<div class="footer">
<div class="footer-inner">
<div class="total">
Total <span class="cart-total">R$ 0</span>
</div>

<a href="bebidas.html" class="btn">Continuar</a>

</div>
</div>

</body>
</html>
