<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Bebidas</title>

<link rel="icon" href="logo.oxente.jpg">
<link rel="stylesheet" href="style.css">
<script src="app.js" defer></script>

</head>

<body onload="progress(70)">

<div class="topbar">
<div class="topbar-inner">

<div class="brand">
<img src="logo.oxente.jpg">
<div class="brand-text">
<strong>Bebidas</strong>
<span>Escolha sua bebida</span>
</div>
</div>

<div>Pedido <span class="cart-count">0</span></div>

</div>

<div class="progress-bar">
<div class="progress-fill"></div>
</div>

</div>

<div class="container">

<div class="title">Refrigerante lata</div>

<div class="list-item">
Coca-cola — R$ 6,00
<div class="qty">
<button onclick="removeItem('Coca lata')">-</button>
<button onclick="addItem('Coca lata',6)">+</button>
</div>
</div>

<div class="list-item">
Fanta laranja — R$ 6,00
<div class="qty">
<button onclick="removeItem('Fanta laranja')">-</button>
<button onclick="addItem('Fanta laranja',6)">+</button>
</div>
</div>

<div class="title">Refrigerante 1L</div>

<div class="list-item">
Guaraná — R$ 9,00
<div class="qty">
<button onclick="removeItem('Guarana 1L')">-</button>
<button onclick="addItem('Guarana 1L',9)">+</button>
</div>
</div>

<div class="list-item">
Cajuína São Geraldo — R$ 9,00
<div class="qty">
<button onclick="removeItem('Cajuina')">-</button>
<button onclick="addItem('Cajuina',9)">+</button>
</div>
</div>

</div>

<div class="footer">
<div class="footer-inner">
<div class="total">
Total <span class="cart-total">R$ 0</span>
</div>

<a href="resumo.html" class="btn">Continuar</a>

</div>
</div>

</body>
</html>
