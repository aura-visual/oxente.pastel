<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Viva o Nordeste</title>

<link rel="icon" href="logo.oxente.jpg">
<link rel="stylesheet" href="style.css">
<script src="app.js" defer></script>

</head>

<body onload="progress(30)">

<div class="topbar">
<div class="topbar-inner">

<div class="brand">
<img src="logo.oxente.jpg">
<div class="brand-text">
<strong>Viva o Nordeste</strong>
<span>Sabores especiais</span>
</div>
</div>

<div>Pedido <span class="cart-count">0</span></div>

</div>

<div class="progress-bar">
<div class="progress-fill"></div>
</div>

</div>

<div class="container">

<div class="list-item">
<div class="list-title">Lampião</div>
<div class="price">R$ 22,99</div>
<div class="qty">
<button onclick="removeItem('Lampião')">-</button>
<button onclick="addItem('Lampião',22.99)">+</button>
</div>
</div>

<div class="list-item">
<div class="list-title">Maria Bonita</div>
<div class="price">R$ 22,99</div>
<div class="qty">
<button onclick="removeItem('Maria Bonita')">-</button>
<button onclick="addItem('Maria Bonita',22.99)">+</button>
</div>
</div>

</div>

<div class="footer">
<div class="footer-inner">
<div class="total">
Total <span class="cart-total">R$ 0</span>
</div>

<a href="acompanhamentos.html" class="btn">Continuar</a>

</div>
</div>

</body>
</html>
